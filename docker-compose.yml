services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: python -m uvicorn backend.app:app --reload --host 0.0.0.0 --port 8000
    environment:
      INVEST_OUTPUT_DIR: /app/python/output/backtest
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./python:/app/python

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    command: npm run dev -- --host 0.0.0.0 --port 3000 --strictPort
    depends_on:
      - backend
    environment:
      VITE_DEV_PROXY_TARGET: http://backend:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules
